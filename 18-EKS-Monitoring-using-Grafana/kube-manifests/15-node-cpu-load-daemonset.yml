apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-cpu-load
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: node-cpu-load
  template:
    metadata:
      labels:
        app: node-cpu-load
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: cpu-burner
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in 1 2; do
                yes > /dev/null &
              done
              wait
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: "2"
              memory: 128Mi
