apiVersion: v1
kind: Namespace
metadata:
  name: cloudwatch-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-nginx-config
  namespace: cloudwatch-demo
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      access_log /var/log/nginx/access.log;
      error_log /var/log/nginx/error.log warn;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      location /healthz {
        access_log off;
        return 200 "ok\n";
      }
    }
  index.html: |
    <!doctype html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>CloudWatch Demo</title>
      <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #0f172a; color: #e2e8f0; }
        .card { max-width: 720px; padding: 24px; border-radius: 16px; background: #111827; border: 1px solid #334155; }
        h1 { margin-top: 0; color: #f8fafc; }
        code { color: #93c5fd; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>CloudWatch Container Insights Demo</h1>
        <p>This NGINX app is used to generate pod, node, and container metrics plus access logs.</p>
        <p>Namespace: <code>cloudwatch-demo</code></p>
        <p>Service: <code>sample-nginx-service</code></p>
      </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-nginx-deployment
  namespace: cloudwatch-demo
  labels:
    app: sample-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-nginx
  template:
    metadata:
      labels:
        app: sample-nginx
    spec:
      containers:
        - name: sample-nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: nginx-config
          configMap:
            name: sample-nginx-config
        - name: nginx-content
          configMap:
            name: sample-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: sample-nginx-service
  namespace: cloudwatch-demo
  labels:
    app: sample-nginx
spec:
  selector:
    app: sample-nginx
  ports:
    - port: 80
      targetPort: 80
