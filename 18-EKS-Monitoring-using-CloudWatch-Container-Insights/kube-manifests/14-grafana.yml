          "id": 2,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"default\",pod=~\"ca-jupyter-notebook.*\",container!=\"\",image!=\"\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "CA Jupyter Pod CPU",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 3,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {
