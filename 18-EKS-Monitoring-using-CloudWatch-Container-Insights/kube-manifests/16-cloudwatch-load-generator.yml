apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-nginx-load-generator
  namespace: cloudwatch-demo
  labels:
    app: sample-nginx-load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-nginx-load-generator
  template:
    metadata:
      labels:
        app: sample-nginx-load-generator
    spec:
      containers:
        - name: load-generator
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                wget -q -O- http://sample-nginx-service.cloudwatch-demo.svc.cluster.local/ > /dev/null
                wget -q -O- http://sample-nginx-service.cloudwatch-demo.svc.cluster.local/healthz > /dev/null
                sleep 0.2
              done
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
