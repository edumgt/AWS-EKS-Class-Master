apiVersion: v1
kind: Service
metadata:
  name: ai-meeting-summarizer-api-nodeport
  namespace: ai-meeting-summarizer
  labels:
    app: ai-meeting-summarizer-api
spec:
  type: NodePort
  selector:
    app: ai-meeting-summarizer-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30082
      protocol: TCP
