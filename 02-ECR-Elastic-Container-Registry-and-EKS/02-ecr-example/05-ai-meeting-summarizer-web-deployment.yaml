apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-meeting-summarizer-web
  namespace: ai-meeting-summarizer
  labels:
    app: ai-meeting-summarizer-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-meeting-summarizer-web
  template:
    metadata:
      labels:
        app: ai-meeting-summarizer-web
    spec:
      containers:
        - name: ai-meeting-summarizer-web
          image: 086015456585.dkr.ecr.ap-northeast-2.amazonaws.com/ai-meeting-summarizer-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
