apiVersion: v1
kind: Service
metadata:
  name: ai-meeting-summarizer-web-nodeport
  namespace: ai-meeting-summarizer
  labels:
    app: ai-meeting-summarizer-web
spec:
  type: NodePort
  selector:
    app: ai-meeting-summarizer-web
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30081
      protocol: TCP
