apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: airflow
type: Opaque
# 실습 환경용 값입니다. 운영 환경에서는 반드시 강력한 패스워드로 교체하세요.
# echo -n 'airflow' | base64          → YWlyZmxvdw==
# echo -n 'airflow123!' | base64      → YWlyZmxvdzEyMyE=
# echo -n 'airflow_meta' | base64     → YWlyZmxvd19tZXRh
stringData:
  mariadb-root-password: "rootpass123!"
  mariadb-user: "airflow"
  mariadb-password: "airflow123!"
  mariadb-database: "airflow_meta"
