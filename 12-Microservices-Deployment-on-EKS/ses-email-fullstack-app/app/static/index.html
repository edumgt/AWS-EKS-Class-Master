<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS SES Email Demo</title>
    <style>
      :root {
        --bg: linear-gradient(135deg, #f3f7ff, #fff7ed);
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --primary: #ea580c;
        --primary-dark: #c2410c;
        --border: #e5e7eb;
        --success: #166534;
        --error: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 720px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(17, 24, 39, 0.08);
      }
      h1 { margin-top: 0; font-size: 2rem; }
      p { color: var(--muted); }
      form { display: grid; gap: 16px; margin-top: 24px; }
      label { display: grid; gap: 8px; font-weight: 600; }
      input, textarea, button {
        font: inherit;
        border-radius: 14px;
      }
      input, textarea {
        width: 100%;
        border: 1px solid var(--border);
        padding: 12px 14px;
      }
      textarea { min-height: 160px; resize: vertical; }
      button {
        border: 0;
        background: var(--primary);
        color: white;
        padding: 14px 18px;
        cursor: pointer;
        transition: background 0.2s ease;
      }
      button:hover { background: var(--primary-dark); }
      .status {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 14px;
        display: none;
      }
      .status.success {
        display: block;
        background: #dcfce7;
        color: var(--success);
      }
      .status.error {
        display: block;
        background: #fee2e2;
        color: var(--error);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Send Email with AWS SES</h1>
        <p>FastAPI, Uvicorn, and vanilla HTML running on EKS.</p>
        <form id="email-form">
          <label>
            Your name
            <input id="sender_name" name="sender_name" type="text" value="EKS Demo User" required />
          </label>
          <label>
            Recipient email
            <input id="to_email" name="to_email" type="email" placeholder="recipient@example.com" required />
          </label>
          <label>
            Subject
            <input id="subject" name="subject" type="text" placeholder="Hello from EKS" required />
          </label>
          <label>
            Message
            <textarea id="message" name="message" placeholder="Write your email message here..." required></textarea>
          </label>
          <button type="submit">Send email</button>
        </form>
        <div id="status" class="status"></div>
      </section>
    </div>
    <script>
      const form = document.getElementById("email-form");
      const statusBox = document.getElementById("status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusBox.className = "status";
        statusBox.textContent = "";

        const payload = {
          sender_name: form.sender_name.value.trim(),
          to_email: form.to_email.value.trim(),
          subject: form.subject.value.trim(),
          message: form.message.value.trim()
        };

        try {
          const response = await fetch("/api/send-email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.detail || "Failed to send email");
          }

          statusBox.className = "status success";
          statusBox.textContent = `Email sent. Message ID: ${result.message_id}`;
          form.reset();
        } catch (error) {
          statusBox.className = "status error";
          statusBox.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
