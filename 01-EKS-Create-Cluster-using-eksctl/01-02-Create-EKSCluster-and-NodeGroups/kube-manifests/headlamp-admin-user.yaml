# Headlamp - 관리자 ServiceAccount 및 ClusterRoleBinding
# 참고: https://github.com/kubernetes-sigs/headlamp
#
# 사용법:
#   kubectl apply -f headlamp-admin-user.yaml
#   kubectl -n headlamp create token headlamp-admin

apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: headlamp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: headlamp
