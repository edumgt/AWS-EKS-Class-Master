---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter-manager-backend
  labels:
    app: jupyter-manager
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jupyter-manager
      tier: backend
  template:
    metadata:
      labels:
        app: jupyter-manager
        tier: backend
    spec:
      serviceAccountName: jupyter-manager-sa
      containers:
      - name: fastapi
        image: 086015456585.dkr.ecr.ap-northeast-2.amazonaws.com/jupyter-manager:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: JUPYTER_IMAGE
          value: "086015456585.dkr.ecr.ap-northeast-2.amazonaws.com/jupyter-minimal-notebook:latest"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter-manager-service
  labels:
    app: jupyter-manager
spec:
  type: LoadBalancer
  selector:
    app: jupyter-manager
    tier: backend
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
