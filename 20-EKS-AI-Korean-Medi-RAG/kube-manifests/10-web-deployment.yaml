apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-rag-web
  namespace: med-rag
  labels:
    app.kubernetes.io/name: med-rag-web
    app.kubernetes.io/part-of: ai-korean-medi-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: med-rag-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-rag-web
        app.kubernetes.io/part-of: ai-korean-medi-rag
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: web-content
              mountPath: /usr/share/nginx/html/app.js
              subPath: app.js
            - name: web-content
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: web-content
          configMap:
            name: med-rag-web-config
