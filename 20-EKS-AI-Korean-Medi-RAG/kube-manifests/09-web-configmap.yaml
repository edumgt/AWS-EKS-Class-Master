apiVersion: v1
kind: ConfigMap
metadata:
  name: med-rag-web-config
  namespace: med-rag
data:
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /ask {
        proxy_pass http://med-rag-api-service.med-rag.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/ {
        proxy_pass http://med-rag-api-service.med-rag.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /docs {
        proxy_pass http://med-rag-api-service.med-rag.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }

      location /openapi.json {
        proxy_pass http://med-rag-api-service.med-rag.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
    }
  index.html: |
    <!doctype html>
    <html lang="ko">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>AI Korean Medi RAG on EKS</title>
      <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="min-h-screen bg-slate-950 text-slate-100">
      <div class="mx-auto max-w-6xl px-6 py-10">
        <div class="grid gap-8 lg:grid-cols-[1.05fr_0.95fr]">
          <section class="rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-cyan-950/20 backdrop-blur">
            <div class="inline-flex rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-xs font-semibold text-cyan-200">
              EKS Service Demo
            </div>
            <h1 class="mt-4 text-4xl font-semibold tracking-tight text-white">AI-Korean-Medi-RAG</h1>
            <p class="mt-4 text-sm leading-7 text-slate-300">
              Qdrant 기반 의료 지식 검색 결과를 FastAPI RAG 엔드포인트로 응답하고, EKS 외부 URL에서 바로 질의할 수 있도록 구성한 데모 화면입니다.
            </p>
            <div class="mt-8 grid gap-4 md:grid-cols-3">
              <div class="rounded-2xl border border-white/10 bg-slate-900/70 p-4">
                <div class="text-xs text-slate-400">Vector DB</div>
                <div class="mt-2 text-lg font-semibold text-white">Qdrant</div>
              </div>
              <div class="rounded-2xl border border-white/10 bg-slate-900/70 p-4">
                <div class="text-xs text-slate-400">API</div>
                <div class="mt-2 text-lg font-semibold text-white">FastAPI</div>
              </div>
              <div class="rounded-2xl border border-white/10 bg-slate-900/70 p-4">
                <div class="text-xs text-slate-400">Frontend</div>
                <div class="mt-2 text-lg font-semibold text-white">NGINX + Tailwind</div>
              </div>
            </div>
            <div class="mt-8 rounded-2xl border border-emerald-400/20 bg-emerald-400/10 p-4 text-sm text-emerald-100">
              Swagger 문서는 <a href="/docs" class="font-semibold underline">/docs</a> 에서 확인할 수 있습니다.
            </div>
          </section>

          <section class="rounded-3xl border border-white/10 bg-slate-900 p-8 shadow-2xl shadow-black/30">
            <div class="flex items-center justify-between">
              <h2 class="text-xl font-semibold text-white">의료 질의 실행</h2>
              <span id="statusBadge" class="rounded-full bg-slate-800 px-3 py-1 text-xs text-slate-300">ready</span>
            </div>

            <div class="mt-6 space-y-5">
              <div>
                <label class="mb-2 block text-sm text-slate-300">도메인(선택)</label>
                <input id="domain" class="w-full rounded-2xl border border-white/10 bg-slate-950 px-4 py-3 text-sm text-white outline-none ring-0" placeholder="예: 소아청소년과" />
              </div>
              <div>
                <label class="mb-2 block text-sm text-slate-300">질문</label>
                <textarea id="query" rows="5" class="w-full rounded-2xl border border-white/10 bg-slate-950 px-4 py-3 text-sm text-white outline-none ring-0" placeholder="예: CAH 조기진단에 중요한 호르몬 수치는 무엇인가요?"></textarea>
              </div>
              <div class="flex flex-wrap gap-3">
                <button id="askButton" class="rounded-2xl bg-cyan-400 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-cyan-300">질의 실행</button>
                <button id="sampleButton" class="rounded-2xl border border-white/10 px-5 py-3 text-sm text-slate-200 hover:bg-white/5">샘플 질문 입력</button>
              </div>
            </div>

            <div class="mt-8 rounded-2xl border border-white/10 bg-slate-950/80 p-5">
              <div class="text-sm font-semibold text-white">답변</div>
              <pre id="answer" class="mt-3 whitespace-pre-wrap text-sm leading-7 text-slate-200">아직 질의하지 않았습니다.</pre>
            </div>

            <div class="mt-5 rounded-2xl border border-white/10 bg-slate-950/80 p-5">
              <div class="flex items-center justify-between">
                <div class="text-sm font-semibold text-white">근거 문단</div>
                <div id="collectionName" class="text-xs text-slate-400">collection: -</div>
              </div>
              <div id="citations" class="mt-3 space-y-3 text-sm text-slate-300"></div>
            </div>
          </section>
        </div>
      </div>

      <script src="/app.js"></script>
    </body>
    </html>
  app.js: |
    (() => {
      const query = document.getElementById('query');
      const domain = document.getElementById('domain');
      const askButton = document.getElementById('askButton');
      const sampleButton = document.getElementById('sampleButton');
      const answer = document.getElementById('answer');
      const citations = document.getElementById('citations');
      const collectionName = document.getElementById('collectionName');
      const statusBadge = document.getElementById('statusBadge');

      sampleButton.addEventListener('click', () => {
        domain.value = '소아청소년과';
        query.value = 'CAH 조기진단에 가장 중요한 호르몬 수치는 무엇인가요?';
      });

      askButton.addEventListener('click', async () => {
        const payload = {
          query: query.value.trim(),
          domain: domain.value.trim() || null,
          top_k: 4
        };

        if (!payload.query) {
          statusBadge.textContent = 'empty';
          answer.textContent = '질문을 먼저 입력하세요.';
          return;
        }

        statusBadge.textContent = 'loading';
        answer.textContent = 'RAG 응답을 생성하고 있습니다...';
        citations.innerHTML = '';

        try {
          const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.detail || '질의 실패');
          }

          statusBadge.textContent = 'done';
          answer.textContent = data.answer || '응답이 비어 있습니다.';
          collectionName.textContent = `collection: ${data.used_collection || '-'}`;

          citations.innerHTML = (data.citations || []).map((item, idx) => `
            <article class="rounded-2xl border border-white/10 bg-slate-900 px-4 py-4">
              <div class="text-xs uppercase tracking-[0.2em] text-cyan-200">Evidence ${idx + 1}</div>
              <div class="mt-2 text-sm font-semibold text-white">${escapeHtml(item.domain_name || '-')} / ${escapeHtml(item.doc_id || '-')}</div>
              <div class="mt-1 text-xs text-slate-400">${escapeHtml(item.source_spec || '-')} ${item.creation_year ? `· ${escapeHtml(item.creation_year)}` : ''}</div>
              <div class="mt-3 leading-6 text-slate-300">${escapeHtml(item.excerpt || '')}</div>
            </article>
          `).join('');
        } catch (error) {
          statusBadge.textContent = 'error';
          answer.textContent = error.message || '오류가 발생했습니다.';
        }
      });

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    })();
