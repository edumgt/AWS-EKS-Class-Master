apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-rag-api
  namespace: med-rag
  labels:
    app.kubernetes.io/name: med-rag-api
    app.kubernetes.io/part-of: ai-korean-medi-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: med-rag-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-rag-api
        app.kubernetes.io/part-of: ai-korean-medi-rag
    spec:
      containers:
        - name: api
          image: 086015456585.dkr.ecr.ap-northeast-2.amazonaws.com/ai-korean-medi-rag-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: med-rag-api-config
            - secretRef:
                name: med-rag-llm-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
