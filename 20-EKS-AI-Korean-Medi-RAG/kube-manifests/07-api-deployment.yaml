apiVersion: apps/v1
kind: Deployment
metadata:
  name: med-rag-api
  namespace: med-rag
  labels:
    app.kubernetes.io/name: med-rag-api
    app.kubernetes.io/part-of: ai-korean-medi-rag
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: med-rag-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-rag-api
        app.kubernetes.io/part-of: ai-korean-medi-rag
    spec:
      containers:
        - name: api
          image: edumgt/ai-korean-medi-rag-app:latest
          imagePullPolicy: Always
          command:
            - uvicorn
            - api.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: med-rag-api-config
            - secretRef:
                name: med-rag-llm-secret
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
