apiVersion: batch/v1
kind: Job
metadata:
  name: med-rag-indexer
  namespace: med-rag
  labels:
    app.kubernetes.io/name: med-rag-indexer
    app.kubernetes.io/part-of: ai-korean-medi-rag
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: med-rag-indexer
        app.kubernetes.io/part-of: ai-korean-medi-rag
    spec:
      restartPolicy: Never
      containers:
        - name: indexer
          image: edumgt/ai-korean-medi-rag-app:latest
          imagePullPolicy: Always
          command:
            - python
            - scripts/index_qdrant.py
            - --docs
            - /app/data/documents.sample.jsonl
          envFrom:
            - configMapRef:
                name: med-rag-api-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
