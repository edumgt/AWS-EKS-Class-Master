  <text x="110" y="430" fill="#0F172A" font-size="24" font-family="Arial, sans-serif" font-weight="700">Business flow</text>
  <text x="110" y="468" fill="#334155" font-size="18" font-family="Arial, sans-serif">1. User opens the web UI or Swagger and asks a medical question.</text>
  <text x="110" y="500" fill="#334155" font-size="18" font-family="Arial, sans-serif">2. FastAPI embeds the question and searches Qdrant collections.</text>
  <text x="110" y="532" fill="#334155" font-size="18" font-family="Arial, sans-serif">3. Retrieved passages are turned into citations and a grounded answer.</text>
  <text x="110" y="564" fill="#334155" font-size="18" font-family="Arial, sans-serif">4. Optional OpenAI path improves the final answer style.</text>
  <text x="110" y="596" fill="#334155" font-size="18" font-family="Arial, sans-serif">5. Web, API, Qdrant, and indexer logs are forwarded to CloudWatch.</text>

