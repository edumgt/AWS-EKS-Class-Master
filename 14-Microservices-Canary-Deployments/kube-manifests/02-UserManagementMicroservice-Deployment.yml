apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-stable
  labels:
    app: nginx-canary-demo
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-canary-demo
      version: stable
  template:
    metadata:
      labels:
        app: nginx-canary-demo
        version: stable
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 80
          command:
            - /bin/sh
            - -c
          args:
            - |
              cat <<EOF > /usr/share/nginx/html/index.html
              <html>
              <head><title>NGINX Stable</title></head>
              <body style="font-family: sans-serif; padding: 2rem;">
                <h1>NGINX Stable</h1>
                <p>This response is from the stable deployment.</p>
                <p>Pod: ${POD_NAME}</p>
              </body>
              </html>
              EOF
              nginx -g 'daemon off;'
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
