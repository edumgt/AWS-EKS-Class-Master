apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-canary
  labels:
    app: nginx-canary-demo
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-canary-demo
      version: canary
  template:
    metadata:
      labels:
        app: nginx-canary-demo
        version: canary
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          command:
            - /bin/sh
            - -c
          args:
            - |
              cat <<'EOF' > /usr/share/nginx/html/index.html
              <html>
              <head><title>NGINX Canary</title></head>
              <body style="font-family: sans-serif; padding: 2rem; background: #fff7ed;">
                <h1>NGINX Canary</h1>
                <p>This response is from the canary deployment.</p>
              </body>
              </html>
              EOF
              nginx -g 'daemon off;'
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
